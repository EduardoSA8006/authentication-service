name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    services:
      postgres:
        image: postgres:17.4-alpine@sha256:7062a2109c4b51f3c792c7ea01e83ed12ef9a980886e3b3d380a7d2e5f6ce3f5
        env:
          POSTGRES_USER: auth
          POSTGRES_PASSWORD: auth
          POSTGRES_DB: auth_service_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7.4-alpine@sha256:119c9edaa6389b4c141f7faa74dae3f3b91ac50c3376d39596044ef07c2592e2
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      mailhog:
        image: mailhog/mailhog:v1.0.1@sha256:8d76a3d4ffa32a3661311944007a415332c4bb855657f4f6c57996405c009bea
        ports:
          - 1025:1025
          - 8025:8025

    env:
      POSTGRES_HOST: 127.0.0.1
      POSTGRES_USER: auth
      POSTGRES_PASSWORD: auth
      POSTGRES_DB: auth_service_test
      POSTGRES_PORT: 5432
      REDIS_HOST: 127.0.0.1
      REDIS_PORT: 6379
      REDIS_PASSWORD: ""
      REDIS_DB: 15
      SMTP_HOST: 127.0.0.1
      SMTP_PORT: 1025
      # Chave fixa para reprodutibilidade do CI, injetada via GitHub Secrets
      # (nunca comitada). Usada em hash_email, CSRF HMAC e derivação da
      # session-key — se vazada, permite forja de hash_email e bypass de CSRF
      # em qualquer ambiente que reuse o mesmo valor.
      SECRET_KEY: ${{ secrets.TEST_SECRET_KEY }}
      ALLOWED_HOSTS: '["localhost","127.0.0.1","test","testserver"]'
      ALLOWED_ORIGINS: '["http://localhost:3000","http://test"]'
      FRONTEND_URL: http://localhost:3000
      ENVIRONMENT: development
      DEBUG: "true"
      COOKIE_SECURE: "false"
      MINIO_ENDPOINT: "127.0.0.1:9000"
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_SECURE: "false"
      HIBP_ENABLED: "false"

    steps:
      # Actions pinadas por SHA full-length (supply-chain: tag pode ser re-apontada
      # pelo maintainer ou atacante com push force; SHA é imutável). Dependabot
      # atualiza o SHA semanalmente via PR — ver .github/dependabot.yml.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Setup Python 3.12
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.12"

      - name: Install Poetry
        uses: snok/install-poetry@76e04a911780d5b312d89783f7b1cd627778900a  # v1.4.1
        with:
          version: 2.3.4
          virtualenvs-in-project: true

      - name: Cache virtualenv
        id: cache-venv
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: .venv
          key: venv-${{ runner.os }}-py312-${{ hashFiles('poetry.lock') }}

      - name: Install dependencies
        if: steps.cache-venv.outputs.cache-hit != 'true'
        run: poetry install --no-root

      - name: Ruff
        run: poetry run ruff check .

      - name: Mypy (static type check)
        run: poetry run mypy app/

      - name: Run migrations
        run: poetry run alembic upgrade head

      - name: Run tests with coverage
        run: poetry run pytest

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: coverage-xml
          path: coverage.xml
          retention-days: 7

  security:
    # needs: test — security job só roda se test passou. Evita PR ficar "verde"
    # em security com testes quebrados.
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Setup Python 3.12
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.12"

      - name: Install Poetry
        uses: snok/install-poetry@76e04a911780d5b312d89783f7b1cd627778900a  # v1.4.1
        with:
          version: 2.3.4
          virtualenvs-in-project: true

      - name: Cache virtualenv
        id: cache-venv
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: .venv
          key: venv-${{ runner.os }}-py312-${{ hashFiles('poetry.lock') }}

      - name: Install dependencies
        if: steps.cache-venv.outputs.cache-hit != 'true'
        run: poetry install --no-root

      - name: pip-audit (CVEs em deps Python)
        # CVE-2025-71176: pytest (dev-only, fix em 9.0.3 mas pytest-asyncio <1.0
        # requer pytest <9). Não afeta runtime. Revisar quando pytest-asyncio bumpar.
        run: poetry run pip-audit --strict --ignore-vuln CVE-2025-71176

      - name: Bandit SAST (HIGH/CRITICAL apenas)
        run: poetry run bandit -r app/ -ll -ii

      - name: Trivy filesystem scan (CVEs + secrets + misconfig)
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1  # 0.35.0
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: 1
          ignore-unfixed: true

      - name: Gitleaks (secrets commitados)
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7  # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
