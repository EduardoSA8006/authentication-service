<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="color-scheme" content="light dark">
  <title>Todas as sessões foram encerradas</title>
</head>
<body style="margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f5;">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="background:#f5f5f5;">
    <tr>
      <td align="center" style="padding:40px 16px;">
        <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="max-width:560px;background:#ffffff;border-radius:8px;box-shadow:0 2px 8px rgba(0,0,0,0.04);">
          <tr>
            <td style="padding:32px 32px 8px;">
              <h1 style="margin:0;font-size:22px;font-weight:600;color:#111827;line-height:1.3;">Olá, {{ name }}</h1>
            </td>
          </tr>
          <tr>
            <td style="padding:16px 32px 0;">
              <p style="margin:0 0 16px;font-size:15px;line-height:1.6;color:#374151;">
                Todas as sessões ativas em sua conta foram encerradas em <strong>{{ when }}</strong>.
              </p>
            </td>
          </tr>
          <tr>
            <td style="padding:8px 32px 24px;">
              <p style="margin:0 0 12px;font-size:14px;color:#374151;line-height:1.6;">
                <strong>Se foi você</strong>, nenhuma ação é necessária.
              </p>
              <div style="padding:12px 16px;background:#fee2e2;border-left:4px solid #dc2626;border-radius:4px;">
                <p style="margin:0;font-size:13px;color:#991b1b;line-height:1.5;">
                  <strong>Se NÃO foi você</strong>, alguém com acesso à sua conta acabou de deslogar todos os seus dispositivos. Troque sua senha imediatamente.
                </p>
              </div>
            </td>
          </tr>
          <tr>
            <td align="center" style="padding:0 32px 32px;">
              <a href="{{ reset_link }}"
                 style="display:inline-block;padding:12px 28px;background:#dc2626;color:#ffffff;text-decoration:none;border-radius:6px;font-size:15px;font-weight:500;">
                Alterar senha
              </a>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
